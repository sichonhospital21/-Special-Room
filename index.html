<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwj5s9GldtgwlQzQZDPdALiEAF1gv2xsUUo2UVy9lKr3kxIkvvFUA3wWezmo8ncln0w/exec'; 

let data = [];

// ฟังก์ชันดึงข้อมูลจาก Google Sheets เมื่อเปิดหน้าเว็บ
async function loadData() {
  showAlert('⏳ กำลังโหลดข้อมูลห้องพิเศษ...', 'ok');
  try {
    const res = await fetch(SCRIPT_URL);
    const json = await res.json();
    
    if (json.status === 'ok') {
      data = json.data || [];
      renderList();
      showAlert('✅ โหลดข้อมูลสำเร็จ', 'ok');
    } else if (json.status === 'empty') {
      data = [];
      renderList();
      showAlert('✅ ระบบพร้อมใช้งาน (ยังไม่มีข้อมูล)', 'ok');
    } else {
      showAlert('❌ เกิดข้อผิดพลาด: ' + json.message, 'err');
    }
  } catch (e) {
    showAlert('❌ ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'err');
  }
}

function fmtDate(d) {
  if (!d) return '-';
  // รองรับทั้งวันที่แบบ YYYY-MM-DD และ Date Object จาก Google Sheets
  const dStr = String(d).includes('T') ? String(d).split('T')[0] : String(d);
  const p = dStr.split('-');
  if(p.length !== 3) return dStr;
  const m = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return p[2].padStart(2, '0') + ' ' + m[parseInt(p[1])-1] + ' ' + (parseInt(p[0])+543);
}

function fmtDateXL(d) {
  if (!d) return '-';
  const dStr = String(d).includes('T') ? String(d).split('T')[0] : String(d);
  const p = dStr.split('-');
  if(p.length !== 3) return dStr;
  return p[2].padStart(2, '0') + '/' + p[1].padStart(2, '0') + '/' + (parseInt(p[0])+543);
}

function srcLabel(s) {
  if (s === 'fb') return 'Facebook';
  if (s === 'counter') return 'เคาน์เตอร์ประชาสัมพันธ์';
  return 'อื่นๆ';
}

function srcBadge(s) {
  if (s === 'fb') return '<span class="badge-fb">FB</span>';
  if (s === 'counter') return '<span class="badge-cnt">เคาน์เตอร์</span>';
  return '<span class="badge-other">อื่นๆ</span>';
}

async function saveBooking() {
  const hn = document.getElementById('hn').value.trim();
  const pname = document.getElementById('pname').value.trim();
  const dbook = document.getElementById('dbook').value;
  const dadmit = document.getElementById('dadmit').value;
  const doctor = document.getElementById('doctor').value.trim();
  const reason = document.getElementById('reason').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const note = document.getElementById('note').value.trim();
  const src = document.querySelector('input[name=src]:checked').value;
  const rooms = [...document.querySelectorAll('#room-opts input:checked')].map(c => c.value);

  if (!hn) return showAlert('กรุณากรอก HN', 'err');
  if (!pname) return showAlert('กรุณากรอกชื่อ-นามสกุล', 'err');
  if (!dbook || !dadmit) return showAlert('กรุณากรอกวันที่', 'err');
  if (!rooms.length) return showAlert('กรุณาเลือกประเภทห้อง', 'err');

  const newId = Date.now().toString();
  const payload = { 
    action: 'add', 
    id: newId, 
    hn, pname, dbook, dadmit, doctor, rooms, reason, phone, note, src 
  };

  showAlert('⏳ กำลังบันทึกข้อมูลลง Google Sheets...', 'ok');
  
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload),
      // ใช้ text/plain เพื่อป้องกันปัญหา CORS Preflight ใน Apps Script
      headers: { "Content-Type": "text/plain;charset=utf-8" }
    });
    const json = await res.json();
    
    if (json.status === 'ok') {
      // แปลง array ห้องให้เป็น string เหมือนที่ backend ทำก่อนเอาเข้าตารางในหน้าเว็บ
      const savedData = {...payload, rooms: payload.rooms.join(', ')};
      data.unshift(savedData);
      
      // ล้างค่าในฟอร์ม
      ['hn','pname','dbook','dadmit','doctor','reason','phone','note'].forEach(id => document.getElementById(id).value = '');
      document.querySelector('input[name=src][value=counter]').checked = true;
      document.querySelectorAll('#room-opts input').forEach(c => c.checked = false);
      renderTags();
      document.getElementById('dbook').value = new Date().toISOString().split('T')[0];
      
      renderList();
      showAlert('✅ บันทึกการจองเรียบร้อย', 'ok');
    } else {
      showAlert('❌ เกิดข้อผิดพลาดจากเซิร์ฟเวอร์', 'err');
    }
  } catch(e) {
    showAlert('❌ การเชื่อมต่อล้มเหลว', 'err');
  }
}

async function del(id) {
  if (!confirm('ยืนยันการลบรายการนี้ออกจากฐานข้อมูล?')) return;
  
  showAlert('⏳ กำลังลบข้อมูล...', 'ok');
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'delete', id: String(id) }),
      headers: { "Content-Type": "text/plain;charset=utf-8" }
    });
    const json = await res.json();
    
    if (json.status === 'ok') {
      data = data.filter(d => String(d.id) !== String(id));
      renderList();
      showAlert('✅ ลบข้อมูลสำเร็จ', 'ok');
    } else {
      showAlert('❌ ไม่สามารถลบข้อมูลได้', 'err');
    }
  } catch(e) {
    showAlert('❌ การเชื่อมต่อล้มเหลว', 'err');
  }
}

function exportExcel() {
  if (!data.length) return showAlert('ยังไม่มีรายการจอง', 'err');
  const rows = data.map((r, i) => ({
    'ลำดับ': i + 1,
    'HN': r.hn,
    'ชื่อ-นามสกุล': r.pname,
    'วันที่จอง': fmtDateXL(r.dbook),
    'วันที่ Admit': fmtDateXL(r.dadmit),
    'ประเภทห้องพิเศษ': r.rooms || '-',
    'แพทย์ผู้นัด': r.doctor || '-',
    'หัตถการ/สาเหตุที่นัด': r.reason || '-',
    'เบอร์ติดต่อ': r.phone || '-',
    'ช่องทางการจอง': srcLabel(r.src),
    'หมายเหตุ': r.note || '-'
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:6},{wch:12},{wch:22},{wch:14},{wch:14},{wch:32},{wch:18},{wch:24},{wch:14},{wch:24},{wch:22}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'รายการจองห้องพิเศษ');
  const d = new Date();
  const fname = 'รายการจองห้องพิเศษ_โรงพยาบาลสิชล_' + d.toLocaleDateString('th-TH').replace(/\//g, '-') + '.xlsx';
  XLSX.writeFile(wb, fname);
  showAlert('✅ ดาวน์โหลด Excel เรียบร้อยแล้ว', 'ok');
}

function downloadReceipt(id) {
  const r = data.find(d => String(d.id) === String(id));
  if (!r) return;
  const refNo = 'REF-' + String(r.id).slice(-6);
  
  // จัดการรูปแบบห้อง (เพราะได้กลับมาจาก API เป็น String แบบคั่นด้วยลูกน้ำ)
  const roomsArr = typeof r.rooms === 'string' ? r.rooms.split(', ') : (r.rooms || []);

  const tpl = document.getElementById('receipt-tpl');
  tpl.innerHTML = `
  <div style="width:720px;background:white;padding:0;font-family:'Sarabun',sans-serif">
    <div style="background:linear-gradient(135deg,#2d7a3a,#1f5c28);padding:28px 36px;display:flex;align-items:center;gap:18px">
      <div style="width:60px;height:60px;background:rgba(255,255,255,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px">🏥</div>
      <div>
        <div style="color:white;font-size:22px;font-weight:700">โรงพยาบาลสิชล</div>
        <div style="color:rgba(255,255,255,0.85);font-size:14px;margin-top:3px">ใบยืนยันการจองห้องพิเศษผู้ป่วยใน</div>
      </div>
      <div style="margin-left:auto;text-align:right">
        <div style="color:rgba(255,255,255,0.7);font-size:12px">เลขที่อ้างอิง</div>
        <div style="color:white;font-size:18px;font-weight:700">${refNo}</div>
      </div>
    </div>
    <div style="padding:32px 36px">
      <div style="background:#f0faf3;border:1.5px solid #a8d5b5;border-radius:12px;padding:22px 26px;margin-bottom:22px">
        <div style="font-size:14px;color:#2d7a3a;margin-bottom:14px;font-weight:700;border-bottom:1px solid #c0e5cc;padding-bottom:8px">👤 ข้อมูลผู้ป่วย</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div><div style="font-size:11px;color:#888;margin-bottom:4px">HN</div><div style="font-size:16px;font-weight:700;color:#111">${r.hn}</div></div>
          <div><div style="font-size:11px;color:#888;margin-bottom:4px">ชื่อ-นามสกุล</div><div style="font-size:16px;font-weight:700;color:#111">${r.pname}</div></div>
          <div><div style="font-size:11px;color:#888;margin-bottom:4px">เบอร์ติดต่อ</div><div style="font-size:14px;color:#111">${r.phone||'-'}</div></div>
          <div><div style="font-size:11px;color:#888;margin-bottom:4px">แพทย์ผู้นัด</div><div style="font-size:14px;color:#111">${r.doctor||'-'}</div></div>
        </div>
      </div>
      <div style="background:#fffbf0;border:1.5px solid #f0d080;border-radius:12px;padding:22px 26px;margin-bottom:22px">
        <div style="font-size:14px;color:#9a6000;margin-bottom:14px;font-weight:700;border-bottom:1px solid #f0d080;padding-bottom:8px">🗓️ รายละเอียดการจอง</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div><div style="font-size:11px;color:#888;margin-bottom:4px">วันที่จอง</div><div style="font-size:14px;color:#111">${fmtDate(r.dbook)}</div></div>
          <div><div style="font-size:11px;color:#888;margin-bottom:4px">วันที่ Admit</div><div style="font-size:18px;font-weight:700;color:#c07800">${fmtDate(r.dadmit)}</div></div>
          <div style="grid-column:span 2">
            <div style="font-size:11px;color:#888;margin-bottom:8px">ประเภทห้องพิเศษที่จอง</div>
            <div style="display:flex;flex-wrap:wrap;gap:7px">${roomsArr.map(rm=>`<span style="background:#2d7a3a;color:white;font-size:13px;padding:4px 14px;border-radius:20px">${rm}</span>`).join('')}</div>
          </div>
          <div style="grid-column:span 2"><div style="font-size:11px;color:#888;margin-bottom:4px">หัตถการ / สาเหตุที่นัด</div><div style="font-size:14px;color:#111">${r.reason||'-'}</div></div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px">
        <div style="background:#f5f5f5;border-radius:10px;padding:16px 20px">
          <div style="font-size:11px;color:#888;margin-bottom:4px">ช่องทางการจอง</div>
          <div style="font-size:14px;font-weight:600;color:#111">${srcLabel(r.src)}</div>
        </div>
        <div style="background:#f5f5f5;border-radius:10px;padding:16px 20px">
          <div style="font-size:11px;color:#888;margin-bottom:4px">หมายเหตุ</div>
          <div style="font-size:14px;color:#111">${r.note||'-'}</div>
        </div>
      </div>
      <div style="border-top:1.5px dashed #ddd;padding-top:16px;display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:12px;color:#aaa">พิมพ์โดยระบบจองห้องพิเศษ โรงพยาบาลสิชล</div>
        <div style="font-size:12px;color:#aaa">วันที่พิมพ์: ${new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'})}</div>

  showAlert('⏳ กำลังสร้างใบหลักฐาน...', 'ok');
  setTimeout(() => {
    html2canvas(tpl, { scale: 2, useCORS: true, backgroundColor: '#ffffff', width: 720 }).then(canvas => {
      const link = document.createElement('a');
      link.download = 'ใบหลักฐานจองห้อง_' + r.hn + '_' + r.pname + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      tpl.innerHTML = '';
      showAlert('✅ ดาวน์โหลดใบหลักฐานเรียบร้อยแล้ว', 'ok');
    }).catch(() => {
      showAlert('❌ เกิดข้อผิดพลาด กรุณาลองใหม่', 'err');
    });
  }, 300);
}

let sortKey = 'id';
let sortAsc = false;

function setSort(key) {
  if (sortKey === key) { sortAsc = !sortAsc; }
  else { sortKey = key; sortAsc = key === 'pname' || key === 'doctor' || key === 'hn'; }
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('sort-' + key);
  if (btn) btn.classList.add('active');
  renderList();
}

function renderList() {
  const tb = document.getElementById('tbl-body');
  const em = document.getElementById('empty-state');
  const rc = document.getElementById('result-count');
  const q = (document.getElementById('search-input') ? document.getElementById('search-input').value : '').trim().toLowerCase();
  
  let filtered = data.filter(r => {
    if (!q) return true;
    const roomStr = typeof r.rooms === 'string' ? r.rooms : (r.rooms || []).join(' ');
    return (r.hn||'').toLowerCase().includes(q)
      || (r.pname||'').toLowerCase().includes(q)
      || (r.doctor||'').toLowerCase().includes(q)
      || (r.reason||'').toLowerCase().includes(q)
      || (r.phone||'').toLowerCase().includes(q)
      || (r.note||'').toLowerCase().includes(q)
      || roomStr.toLowerCase().includes(q);
  });

  filtered.sort((a, b) => {
    let va = a[sortKey] || '';
    let vb = b[sortKey] || '';
    if (sortKey === 'id') { va = Number(va); vb = Number(vb); }
    const cmp = va < vb ? -1 : va > vb ? 1 : 0;
    return sortAsc ? cmp : -cmp;
  });

  if (!data.length) { tb.innerHTML = ''; em.style.display = 'block'; rc.textContent = ''; return; }
  em.style.display = 'none';
  rc.textContent = q ? `พบ ${filtered.length} รายการ จากทั้งหมด ${data.length} รายการ` : `ทั้งหมด ${data.length} รายการ`;
  
  if (!filtered.length) { tb.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:24px;color:#999">ไม่พบรายการที่ค้นหา</td></tr>`; return; }
  
  tb.innerHTML = filtered.map(r => {
    const roomHtml = typeof r.rooms === 'string' ? r.rooms.replace(/, /g, '<br>') : (r.rooms||[]).join('<br>');
    return `<tr>
      <td><strong>${r.hn}</strong></td>
      <td>${r.pname}</td>
      <td>${fmtDate(r.dbook)}</td>
      <td style="color:#c07800;font-weight:600">${fmtDate(r.dadmit)}</td>
      <td>${roomHtml}</td>
      <td>${r.doctor||'-'}</td>
      <td>${r.reason||'-'}</td>
      <td>${r.phone||'-'}</td>
      <td>${srcBadge(r.src)}${r.note ? '<br><span style="font-size:12px;color:#666">'+r.note+'</span>' : ''}</td>
      <td style="min-width:90px">
        <button class="btn-receipt" onclick="downloadReceipt('${r.id}')">🖼️ ใบหลักฐาน</button>
        <button class="btn-del" onclick="del('${r.id}')">🗑️ ลบ</button>
      </td>
    </tr>`;
  }).join('');
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  renderList();
}

function renderTags() {
  const tags = document.getElementById('room-tags');
  tags.innerHTML = [...document.querySelectorAll('#room-opts input:checked')].map(c =>
    `<span class="tag">${c.value}<button onclick="unchk('${c.value}')" aria-label="ลบ">×</button></span>`
  ).join('');
}

function unchk(val) {
  const cb = [...document.querySelectorAll('#room-opts input')].find(c => c.value === val);
  if (cb) { cb.checked = false; renderTags(); }
}

document.querySelectorAll('#room-opts input').forEach(c => c.addEventListener('change', renderTags));

function sw(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['form','list'][i] === tab));
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + tab).classList.add('active');
  if (tab === 'list') renderList();
}

function showAlert(msg, type) {
  const el = document.getElementById('alert-box');
  el.className = 'alert alert-' + (type === 'ok' ? 'ok' : 'err');
  el.textContent = msg;
  el.style.display = 'block';
  // ถ้าเป็นสถานะโหลด ไม่ต้องให้ปิดเองอัตโนมัติ
  if (msg.includes('⏳')) return; 
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

// ตั้งค่าวันที่เริ่มต้นเป็นวันนี้
document.getElementById('dbook').value = new Date().toISOString().split('T')[0];

// เริ่มต้นดึงข้อมูลทันทีเมื่อเปิดหน้า
loadData();
</script>
